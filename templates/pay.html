<div class="wallet" style="text-align:center;">

    <p><b>Send USDT (TRC20) to:</b></p>

    <input id="walletInput" type="text" value="{{ wallet }}" readonly style="width:100%; text-align:center;">

    <br><br>

    <button type="button" onclick="copyWallet()" class="btn">
        نسخ العنوان
    </button>

    <br><br>

    <img src="{{ url_for('static', filename='qr.png') }}" width="220">

    <p style="color:gray; font-size:14px;">
        انسخ الباركود أو انسخ العنوان للدفع
    </p>

    <!-- هذا المهم -->
    <form method="POST">
    <input type="text" name="txid" placeholder="ادخل TxID" required>
    
    <button type="submit">
        دفعت
    </button>
</form>

</div>

<script>
function confirmPayment() {
    alert("تم استلام طلبك، جاري التحقق من الدفع");
}
</script>
<script>
function confirmPayment() {
    fetch('/confirm_payment', {
        method: 'POST'
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    });
}
</script>
