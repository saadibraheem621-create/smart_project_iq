{% extends "base.html" %}
{% block content %}
<div class="form-box">
    <h1>Payment</h1>
    <p>Order #{{ order.id }}</p>
    <p>Service: {{ order.service_name }}</p>
    <p>Amount: <b>{{ order.price }} USDT</b></p>

    <div class="wallet">
        <p>Send USDT using TRC20 network to:</p>
        <code>{{ wallet }}</code>
        <img src="{{ url_for('static', filename='qr.png') }}" width="200">
        <br><br>

    </div>

    <form method="POST">
        <label>Transaction ID / TxID</label>
        <input name="txid" placeholder="ضع رقم التحويل بعد الدفع" required>
        <button class="btn" type="submit">I Paid</button>
    </form>
</div>
{% endblock %}
<h3>الدفع عبر USDT</h3>

<p>أرسل المبلغ إلى العنوان التالي:</p>

<input type="text" value="{{ wallet }}" readonly style="width:100%">

<br><br>
<br><br>
<img src="{{ url_for('static', filename='qr.png') }}" width="220" alt="USDT QR Code">
<br><br>
