{% extends "base.html" %}
{% block content %}
<div class="form-box">
    <h1>Order: {{ service.name }}</h1>
    <p>Price: ${{ service.price }}</p>

    <form method="POST">
    <select name="method">
        <option value="usdt">USDT</option>
        <option value="paypal">PayPal</option>
        <option value="card">Visa / MasterCard</option>
    </select>
    <button type="submit">اختيار</button>
</form>
</div>
{% endblock %}
